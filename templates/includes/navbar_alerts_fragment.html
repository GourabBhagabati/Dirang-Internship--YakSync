{% if recent_active_alerts %}
    {% for alert in recent_active_alerts %}
        <div class="notification-item severity-{{ alert.severity }}" style="display: flex; gap: 0.75rem; padding: 0.875rem 1.25rem; border-bottom: 1px solid var(--border-color); align-items: flex-start; transition: var(--transition);">
            <div class="notification-icon" style="font-size: 1rem; margin-top: 2px; display: flex; align-items: center; justify-content: center; width: 26px; height: 26px; border-radius: 50%; flex-shrink: 0;
                {% if alert.severity == 'critical' %}
                    background: rgba(220, 38, 38, 0.1); color: var(--danger-color);
                {% elif alert.severity == 'warning' %}
                    background: rgba(245, 158, 11, 0.1); color: var(--warning-color);
                {% else %}
                    background: rgba(37, 99, 235, 0.1); color: var(--secondary-color);
                {% endif %}">
                {% if alert.severity == 'critical' %}
                    <i class="fa-solid fa-circle-exclamation"></i>
                {% elif alert.severity == 'warning' %}
                    <i class="fa-solid fa-triangle-exclamation"></i>
                {% else %}
                    <i class="fa-solid fa-circle-info"></i>
                {% endif %}
            </div>
            <div class="notification-details" style="flex: 1; min-width: 0;">
                <div class="notification-title" style="font-size: 0.8rem; font-weight: 600; color: var(--text-primary); margin-bottom: 0.25rem; line-height: 1.3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;" title="{{ alert.title }}">
                    {{ alert.title }}
                </div>
                <div class="notification-meta" style="font-size: 0.75rem; color: var(--text-secondary); display: flex; justify-content: space-between; align-items: center; gap: 4px;">
                    <span>{{ alert.timestamp|timesince }} ago</span>
                    <!-- Acknowledge Form -->
                    <form action="{% url 'alerts:acknowledge' alert.pk %}" method="POST" style="margin: 0; display: inline;">
                        {% csrf_token %}
                        <button type="submit" class="btn-ack" title="Acknowledge Alert" style="background: none; border: none; padding: 2px 4px; color: var(--text-secondary); cursor: pointer; border-radius: 4px; transition: var(--transition);">
                            <i class="fa-solid fa-check"></i>
                        </button>
                    </form>
                </div>
            </div>
        </div>
    {% endfor %}
{% else %}
    <div style="padding: 2rem 1rem; text-align: center; color: var(--text-secondary); font-size: 0.85rem;">
        <i class="fa-regular fa-bell-slash" style="font-size: 1.5rem; margin-bottom: 0.5rem; display: block; color: var(--text-secondary); opacity: 0.5;"></i>
        No active alerts.
    </div>
{% endif %}
