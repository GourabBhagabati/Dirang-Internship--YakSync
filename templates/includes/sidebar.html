<div class="sidebar-header">
    <a href="{% url 'dashboard:index' %}" class="sidebar-brand">
        <i class="fa-solid fa-cow"></i> YakSync<span class="brand-sync-dot"></span>
    </a>
    <button class="sidebar-close-btn" id="sidebarClose" aria-label="Close Sidebar">
        <i class="fa-solid fa-xmark"></i>
    </button>
</div>

<ul class="sidebar-menu">
    <li class="menu-item">
        <a href="{% url 'dashboard:index' %}" class="menu-link {% if request.resolver_match.url_name == 'index' %}active{% endif %}">

            <span>Dashboard</span>
        </a>
    </li>
    <li class="menu-item">
        <a href="{% url 'animals:list' %}" class="menu-link {% if request.resolver_match.app_name == 'animals' %}active{% endif %}">
            <span class="menu-icon"><i class="fa-solid fa-cow"></i></span>
            <span>Animals</span>
        </a>
    </li>
    <li class="menu-item">
        <a href="{% url 'devices:list' %}" class="menu-link {% if request.resolver_match.app_name == 'devices' %}active{% endif %}">

        </a>
    </li>
    <li class="menu-item">
        <a href="{% url 'monitoring:list' %}" class="menu-link {% if request.resolver_match.app_name == 'monitoring' %}active{% endif %}">

        </a>

        <a href="{% url 'hormones:reservoir_list' %}" class="menu-link {% if request.resolver_match.app_name == 'hormones' %}active{% endif %}">

            <span>Protocols</span>
        </a>
    </li>
    <li class="menu-item">
        <a href="{% url 'alerts:dashboard' %}" class="menu-link {% if request.resolver_match.app_name == 'alerts' %}active{% endif %}">

        </a>

            <span>Reports</span>
        </a>
    </li>
    {% if request.user.is_superuser or request.user.profile.role == 'administrator' %}
    <li class="menu-item">
        <a href="{% url 'logs:dashboard' %}" class="menu-link {% if request.resolver_match.app_name == 'logs' %}active{% endif %}">
            <span class="menu-icon"><i class="fa-solid fa-clock-rotate-left"></i></span>
            <span>Activity Logs</span>
        </a>
    </li>
    {% endif %}
